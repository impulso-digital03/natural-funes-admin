<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seguí tu pedido – Natural Funes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f9fafb; }

  .header {
    background: #15803d;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p  { font-size: 12px; opacity: .8; }

  #map { width: 100%; height: 52vh; }

  .info-panel {
    padding: 16px 20px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f0fdf4;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
  }
  .pulse-ring {
    width: 14px; height: 14px; border-radius: 50%;
    background: #22c55e;
    position: relative;
    flex-shrink: 0;
  }
  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid #22c55e;
    animation: ring 1.4s ease-out infinite;
  }
  @keyframes ring { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(2);opacity:0} }

  .status-text h3 { font-size: 14px; color: #15803d; font-weight: 700; }
  .status-text p  { font-size: 12px; color: #6b7280; }

  .eta-badge {
    margin-left: auto;
    background: #15803d;
    color: #fff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .order-card {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .order-card h4 { font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
  .order-card p  { font-size: 14px; color: #111827; }

  .no-signal {
    text-align: center;
    padding: 32px 20px;
    color: #9ca3af;
  }
  .no-signal .icon { font-size: 48px; margin-bottom: 12px; }
  .no-signal p { font-size: 14px; }

  .last-update { font-size: 11px; color: #d1d5db; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌿 Natural Funes</h1>
    <p>Seguimiento de tu pedido en tiempo real</p>
  </div>
</div>

<div id="map"></div>

<div class="info-panel">
  <div class="status-bar" id="statusBar">
    <div class="pulse-ring" id="pulseDot" style="background:#9ca3af"></div>
    <div class="status-text">
      <h3 id="statusTitle">Conectando...</h3>
      <p id="statusSub">Esperando señal del cadete</p>
    </div>
    <div class="eta-badge" id="etaBadge" style="display:none">—</div>
  </div>

  <div class="order-card" id="orderCard" style="display:none">
    <h4>TU PEDIDO</h4>
    <p id="orderDetail">—</p>
  </div>

  <div class="no-signal" id="noSignal">
    <div class="icon">🛵</div>
    <p>El cadete va en camino.<br>El mapa se actualiza cuando esté cerca.</p>
  </div>

  <div class="last-update" id="lastUpdate"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://zxbdzeggkdrggelxskfu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4YmR6ZWdna2RyZ2dlbHhza2Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk2NDAsImV4cCI6MjA5MjU0NTY0MH0.OgSJnFExZEw8wWp1E3qx12eyQ6h9_0-15ZJCnZBaIFA';
const STORE_LAT =  -32.940;
const STORE_LNG =  -60.912;
const STORE_ADDR = 'Av. Fuerza Aérea 2092 Sur, Funes';

const sb       = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const params   = new URLSearchParams(location.search);
const orderId  = params.get('order');

// ---- Mapa ----
const map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Ícono tienda
const storeIcon = L.divIcon({
  html: '<div style="background:#15803d;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.3)">🌿</div>',
  iconSize: [36,36], iconAnchor: [18,18], className: ''
});
// Ícono cadete
const riderIcon = L.divIcon({
  html: '<div style="background:#f59e0b;color:#fff;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.3);animation:bob .8s ease-in-out infinite alternate">🛵</div><style>@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-4px)}}</style>',
  iconSize: [40,40], iconAnchor: [20,20], className: ''
});
// Ícono destino
const destIcon = L.divIcon({
  html: '<div style="background:#ef4444;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.3)">📍</div>',
  iconSize: [36,36], iconAnchor: [18,36], className: ''
});

const storeMarker = L.marker([STORE_LAT, STORE_LNG], { icon: storeIcon })
  .addTo(map)
  .bindPopup('<b>Natural Funes</b><br>' + STORE_ADDR);

let riderMarker = null;
let destMarker  = null;
let routeLine   = null;
let orderData   = null;
let hasPosition = false;

map.setView([STORE_LAT, STORE_LNG], 14);

// ---- Geocodifica dirección del cliente ----
async function geocodeAddress(address) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
    const r = await fetch(url, { headers: { 'User-Agent': 'NaturalFunesTracking/1.0' } });
    const j = await r.json();
    if (j.length) return { lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon) };
  } catch {}
  return null;
}

// ---- Carga datos del pedido ----
async function loadOrder() {
  if (!orderId) return;
  const { data } = await sb.from('orders')
    .select('order_number,nombre,apellido,domicilio,ciudad,status')
    .eq('id', orderId).single();
  if (!data) return;
  orderData = data;

  document.getElementById('orderCard').style.display = 'block';
  document.getElementById('orderDetail').textContent =
    `Pedido #${data.order_number} — ${data.nombre} ${data.apellido}`;

  // Geocodificar destino
  if (data.domicilio) {
    const addr = [data.domicilio, data.ciudad, 'Funes, Santa Fe, Argentina'].filter(Boolean).join(', ');
    const coords = await geocodeAddress(addr);
    if (coords) {
      destMarker = L.marker([coords.lat, coords.lng], { icon: destIcon })
        .addTo(map)
        .bindPopup(`<b>Tu domicilio</b><br>${data.domicilio}`);
    }
  }
}

// ---- Actualiza posición del cadete ----
function updateRiderPosition(lat, lng, updatedAt) {
  hasPosition = true;
  document.getElementById('noSignal').style.display   = 'none';
  document.getElementById('pulseDot').style.background = '#22c55e';
  document.getElementById('statusTitle').textContent  = 'Tu pedido está en camino';
  document.getElementById('statusSub').textContent    = 'Seguimiento GPS activo';

  if (!riderMarker) {
    riderMarker = L.marker([lat, lng], { icon: riderIcon }).addTo(map).bindPopup('🛵 Cadete');
  } else {
    riderMarker.setLatLng([lat, lng]);
  }

  // Calcula ETA aproximado con distancia haversine
  if (destMarker) {
    const dest = destMarker.getLatLng();
    const dist = haversine(lat, lng, dest.lat, dest.lng);
    const minutos = Math.round((dist / 30) * 60); // 30 km/h promedio ciudad
    const eta = new Date(Date.now() + minutos * 60000);
    const hhmm = `${String(eta.getHours()).padStart(2,'0')}:${String(eta.getMinutes()).padStart(2,'0')}`;
    const badge = document.getElementById('etaBadge');
    badge.style.display = 'block';
    badge.textContent   = minutos <= 2 ? '¡Llegando!' : `~${hhmm} (${minutos} min)`;

    // Línea de ruta simple
    const bounds = [[lat, lng], [dest.lat, dest.lng]];
    if (routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline([[lat,lng],[dest.lat,dest.lng]], {
      color: '#15803d', weight: 3, dashArray: '8 6', opacity: .7
    }).addTo(map);
    map.fitBounds(bounds, { padding: [60, 60] });
  } else {
    map.setView([lat, lng], 15);
  }

  // Hora de última actualización
  const d = new Date(updatedAt || Date.now());
  document.getElementById('lastUpdate').textContent =
    `Última actualización: ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ---- Suscripción Realtime ----
async function subscribeToRider() {
  const targetOrderId = orderId || 'default';

  // Carga posición actual primero
  const { data } = await sb.from('rider_positions')
    .select('*').eq('order_id', targetOrderId).single();
  if (data) updateRiderPosition(data.lat, data.lng, data.updated_at);

  // Luego escucha cambios en tiempo real
  sb.channel('rider-pos')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'rider_positions',
      filter: `order_id=eq.${targetOrderId}`,
    }, payload => {
      const d = payload.new;
      if (d && d.lat && d.lng) updateRiderPosition(d.lat, d.lng, d.updated_at);
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        document.getElementById('statusSub').textContent = 'Conectado — esperando señal';
      }
    });
}

loadOrder();
subscribeToRider();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Funes — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Google Maps se carga dinámicamente al usar el despacho -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0fdf4;color:#111827;font-size:14px}

/* ── Login ───────────────────────────────────────── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0fdf4}
.login-box{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-box .logo{font-size:40px;text-align:center;margin-bottom:8px}
.login-box h2{text-align:center;font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
.login-box p{text-align:center;font-size:13px;color:#6b7280;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .15s}
.login-box input:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.login-box button{width:100%;padding:10px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.login-box button:hover{background:#15803d}
.login-error{background:#fee2e2;color:#dc2626;padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:12px;display:none}

/* ── App Shell ───────────────────────────────────── */
#app{display:none}
header{background:#16a34a;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.header-logo{font-size:24px}
.header-title{flex:1}
.header-title h1{font-size:17px;font-weight:700;line-height:1.2}
.header-title span{font-size:12px;opacity:.8}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-exit{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .15s}
.btn-exit:hover{background:rgba(255,255,255,.3)}

nav{background:#fff;border-bottom:2px solid #e5e7eb;padding:0 20px;display:flex;overflow-x:auto}
nav button{padding:13px 16px;background:none;border:none;border-bottom:3px solid transparent;color:#6b7280;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-2px}
nav button.active{color:#16a34a;border-bottom-color:#16a34a;font-weight:600}
nav button:hover:not(.active){color:#374151;background:#f9fafb}

main{padding:20px;max-width:1280px;margin:0 auto}

/* ── Cards ───────────────────────────────────────── */
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-header{padding:14px 18px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-header h2{font-size:15px;font-weight:600;color:#111827}

/* ── Stats ───────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card .stat-label{font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
.stat-card .stat-value{font-size:30px;font-weight:700;line-height:1}
.stat-card.orange .stat-value{color:#ea580c}
.stat-card.green .stat-value{color:#16a34a}
.stat-card.blue .stat-value{color:#2563eb}
.stat-card.gray .stat-value{color:#374151}

/* ── Buttons ─────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;text-decoration:none}
.btn-primary{background:#16a34a;color:#fff}
.btn-primary:hover{background:#15803d}
.btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8}
.btn-orange{background:#ea580c;color:#fff}
.btn-orange:hover{background:#c2410c}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:5px}

/* ── Filter bar ──────────────────────────────────── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:99px;border:1px solid #d1d5db;background:#fff;font-size:12px;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#16a34a;color:#fff;border-color:#16a34a}
.filter-btn:hover:not(.active){background:#f3f4f6}

/* ── Table ───────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f9fafb;padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.empty-state{padding:48px 20px;text-align:center;color:#9ca3af;font-size:14px}

/* ── Badges ──────────────────────────────────────── */
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-green{background:#dcfce7;color:#15803d}
.badge-green-pulse{background:#dcfce7;color:#15803d;animation:pulse 1.5s ease-in-out infinite}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-darkgreen{background:#14532d;color:#f0fdf4}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-orange{background:#ffedd5;color:#c2410c}
.badge-purple{background:#ede9fe;color:#6d28d9}
.badge-yellow{background:#fef9c3;color:#a16207}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Status select ───────────────────────────────── */
.status-select{font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-weight:500}
.status-select:focus{outline:none;border-color:#16a34a}

/* ── Toggle ──────────────────────────────────────── */
.toggle{position:relative;display:inline-block;width:38px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:99px;transition:.2s}
.toggle input:checked+.toggle-slider{background:#16a34a}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

/* ── Search input ────────────────────────────────── */
.search-input{padding:8px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;width:240px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.08)}

/* ── Modals ──────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-sm{max-width:480px}
.modal-md{max-width:620px}
.modal-lg{max-width:780px}
.modal-header{padding:18px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;padding:2px 8px;border-radius:4px;line-height:1}
.modal-close:hover{background:#f3f4f6;color:#111}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}

/* ── Form ────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px}
.form-label .req{color:#dc2626}
.form-input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.08)}
.form-input:disabled{background:#f9fafb;color:#9ca3af}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:12px;color:#6b7280;margin-top:4px}
.margin-display{font-size:12px;font-weight:600;margin-top:4px;padding:4px 8px;border-radius:4px;display:inline-block}
.margin-good{background:#dcfce7;color:#15803d}
.margin-ok{background:#fef9c3;color:#a16207}
.margin-bad{background:#fee2e2;color:#dc2626}

/* ── Inline stock edit ───────────────────────────── */
.stock-display{display:flex;align-items:center;gap:4px}
.stock-input{width:70px;padding:3px 7px;border:1px solid #16a34a;border-radius:4px;font-size:12px;outline:none}

/* ── Dispatch modal specific ─────────────────────── */
.dispatch-stop{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:8px;background:#fafafa}
.stop-num{width:28px;height:28px;background:#16a34a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.stop-info{flex:1}
.stop-name{font-size:14px;font-weight:600;color:#111}
.stop-address{font-size:12px;color:#6b7280;margin-top:2px}
.stop-eta{font-size:13px;font-weight:700;color:#16a34a;margin-top:4px}
.dispatch-loading{text-align:center;padding:32px;color:#6b7280}
.dispatch-loading .spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.route-summary{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#15803d;font-weight:500}

/* ── Toast ───────────────────────────────────────── */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:#16a34a;color:#fff}
.toast-error{background:#dc2626;color:#fff}
.toast-info{background:#2563eb;color:#fff}

/* ── Order items ─────────────────────────────────── */
.order-item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.order-item-row:last-child{border-bottom:none}
.order-total-row{display:flex;justify-content:space-between;padding:10px 0 0;font-size:14px;font-weight:700;border-top:2px solid #e5e7eb;margin-top:4px}

/* ── WhatsApp tab ────────────────────────────────── */
.wa-msg{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid #f3f4f6;transition:background .1s}
.wa-msg:hover{background:#fafafa}
.wa-msg:last-child{border-bottom:none}
.wa-arrow{font-size:18px;opacity:.6;flex-shrink:0;padding-top:1px}
.wa-info{flex:1;min-width:0}
.wa-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wa-number{font-size:13px;font-weight:600;color:#111}
.wa-name{font-size:12px;color:#6b7280}
.wa-time{font-size:11px;color:#9ca3af;margin-left:auto}
.wa-body{font-size:13px;color:#374151;margin-top:3px;word-break:break-word}

/* ── Spinner ─────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px}

/* ── Loading skeleton ────────────────────────────── */
.loading-text{color:#9ca3af;font-size:13px;padding:20px;text-align:center}

/* ── Responsive ──────────────────────────────────── */
@media(max-width:640px){
  main{padding:12px}
  .form-row{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .search-input{width:100%}
  th,td{padding:8px 10px}
  .modal-footer{flex-direction:column}
  .modal-footer .btn{width:100%;justify-content:center}
}
</style>
</head>

     MODAL — PRODUCT ADD/EDIT

// ═══════════════════════════════════════════════════════
//  GOOGLE MAPS CALLBACK
// ═══════════════════════════════════════════════════════
function initGoogleMaps() {
  googleMapsReady = true;
}

function loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (googleMapsReady) { resolve(); return; }
    if (document.querySelector('script[data-maps]')) {
      // already loading, wait
      const check = setInterval(() => { if (googleMapsReady) { clearInterval(check); resolve(); } }, 100);
      return;
    }
    window._mapsResolve = resolve;
    window.initGoogleMaps = function() { googleMapsReady = true; window._mapsResolve && window._mapsResolve(); };
    const s = document.createElement('script');
    s.setAttribute('data-maps','1');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=initGoogleMaps`;
    s.onerror = () => reject(new Error('No se pudo cargar Google Maps'));
    document.head.appendChild(s);
  });
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const pass = document.getElementById('login-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderPedidos();
  } else {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-pass').value = '';
}

function switchTab(tab, btn) {
  ['pedidos','productos','whatsapp'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'pedidos')   renderPedidos();
  if (tab === 'productos') renderProductos();
  if (tab === 'whatsapp')  renderWhatsapp();
}

//  TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

async function renderPedidos() {
  const container = document.getElementById('tab-pedidos');
  container.innerHTML = '<div class="loading-text">Cargando pedidos...</div>';

  // Fetch all orders for today's stats
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayISO = today.toISOString();

  const { data: allOrders, error: err1 } = await sb
    .from('orders')
    .select('id,order_number,nombre,apellido,telefono,domicilio,total,status,delivery_type,payment_method,payment_status,created_at,notes')
    .order('created_at', { ascending: false });

  if (err1) {
    container.innerHTML = `<div class="card"><div class="empty-state">Error al cargar pedidos: ${err1.message}</div></div>`;
    return;
  }

  const orders = allOrders || [];

  // Stats counts
  const todayOrders = orders.filter(o => o.created_at >= todayISO);
  const pendientes  = todayOrders.filter(o => o.status === 'pendiente').length;
  const listos      = orders.filter(o => o.status === 'listo').length;
  const enCamino    = orders.filter(o => o.status === 'en camino').length;
  const entregados  = todayOrders.filter(o => o.status === 'entregada').length;

  // Filter

  // Build HTML
  const listosConDomicilio = orders.filter(o => o.status === 'listo' && o.domicilio && o.domicilio.trim() !== '');
  const despacharDisabled  = listosConDomicilio.length === 0;

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card orange">
        <div class="stat-label">Pendientes hoy</div>
        <div class="stat-value">${pendientes}</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Listos para despachar</div>
        <div class="stat-value" style="${listos>0?'animation:pulse 1.5s ease-in-out infinite':''}">${listos}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">En camino</div>
        <div class="stat-value">${enCamino}</div>
      </div>
      <div class="stat-card gray">
        <div class="stat-label">Entregados hoy</div>
        <div class="stat-value">${entregados}</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div class="filter-bar" style="margin-bottom:0">
        ${['pendiente','listo','en camino','cancelado','todos'].map(f =>
          `<button class="filter-btn${currentFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`
        ).join('')}
      </div>
      <button class="btn btn-orange ${despacharDisabled?'':'btn-orange'}" ${despacharDisabled?'disabled':''} onclick="openDispatchModal()">

    </div>

    <div class="card">
      <div class="table-wrap">
        ${filtered.length === 0
          ? `<div class="empty-state">No hay pedidos con estado "${currentFilter}".</div>`
          : `<table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Cliente</th>
                  <th>Domicilio</th>
                  <th>Total</th>
                  <th>Origen</th>
                  <th>Estado</th>

              <tbody>
                ${filtered.map(o => orderRow(o)).join('')}

async function changeStatus(selectEl) {
  const id      = selectEl.dataset.id;
  const oldStatus = selectEl.dataset.old;
  const newStatus = selectEl.value;

  selectEl.disabled = true;

  // Update in Supabase (incluir ciudad para armar dirección completa en ETA)
  const { data, error } = await sb
    .from('orders')
    .update({ status: newStatus })
    .eq('id', id)
    .select('id,order_number,nombre,apellido,telefono,domicilio,ciudad,total,status,delivery_type,payment_method,notes')
    .single();

  selectEl.disabled = false;

  if (error) {
    toast('Error al actualizar: ' + error.message, 'error');
    selectEl.value = oldStatus;
    return;
  }

  selectEl.dataset.old = newStatus;
  toast(`Estado cambiado a "${newStatus}"`);

  // Update badge style
  const td = selectEl.closest('td').previousElementSibling;

  // Notify edge function
  try {
    await fetch(NOTIFY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        record: { ...data, status: newStatus },
        old_record: { status: oldStatus }
      })
    });
  } catch(e) {
    console.warn('notify-order-status error:', e);
  }

  // Si pasa a "en camino": links de rider + tracking + WhatsApp al cliente
  if (newStatus === 'en camino') {
    const orderNum = data.order_number || data.id.slice(0,6);
    const base = window.location.protocol + '//' + window.location.host;
    const riderLink    = `${base}/rider.html?order=${data.id}`;
    const trackingLink = `${base}/tracking.html?order=${data.id}`;
    abrirModalEnCamino(data, orderNum, riderLink, trackingLink);
  }

  // Si pasa a "entregado": generar comprobante automáticamente
  if (newStatus === 'entregado') {
    await generarComprobanteDesdeOrden(data);
  }

  // Re-render if needed (re-fetch to keep stats accurate)
  renderPedidos();
}

// ── Auto-comprobante desde pedido entregado ──────────────
async function generarComprobanteDesdeOrden(order) {
  try {
    // Buscar items del pedido
    const { data: orderItems } = await sb
      .from('order_items')
      .select('*')
      .eq('order_id', order.id);

    const items = (orderItems || []).map(it => ({
      desc: it.product_name || it.nombre || 'Producto',
      qty:  it.quantity || it.cantidad || 1,
      price: it.unit_price || it.precio_unitario || (it.subtotal / (it.quantity || 1)) || 0,
    }));

    // Si no hay items, crear uno genérico con el total
    if (!items.length) {
      items.push({ desc: `Pedido #${order.order_number}`, qty: 1, price: Number(order.total || 0) });
    }

    const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
    const metodoPago = {
      mercadopago: 'mercadopago',
      transferencia: 'transferencia',
      tarjeta: 'tarjeta',
      efectivo: 'efectivo',
    }[order.payment_method] || order.payment_method || 'efectivo';

    const { data, error } = await sb.from('comprobantes').insert({
      tipo:             'remito',
      fecha:            new Date().toISOString().slice(0, 10),
      cliente_nombre:   `${order.nombre || ''} ${order.apellido || ''}`.trim() || 'Cliente',
      cliente_direccion: [order.domicilio, order.ciudad].filter(Boolean).join(', ') || null,
      metodo_pago:      metodoPago,
      items,
      subtotal,
      iva:              0,
      total:            subtotal,
      order_id:         order.id,
      order_number:     order.order_number,
      origen:           'pedido',
      notas:            order.notes || null,
    }).select('numero').single();

    if (error) throw error;

    // Registrar en caja
    await sb.from('caja_movimientos').insert({
      fecha:       new Date().toISOString().slice(0, 10),
      tipo:        'venta',
      concepto:    `Pedido #${order.order_number} — ${order.nombre || ''}`,
      metodo_pago: metodoPago,
      monto:       subtotal,
    });

    toast(`✅ Comprobante N°${String(data.numero).padStart(4,'0')} generado automáticamente`);
  } catch(e) {
    console.warn('Error generando comprobante:', e);
    toast('Pedido entregado (comprobante pendiente)', 'warn');
  }
}

async function openDispatchModal() {
  dispatchRouteData = null;
  document.getElementById('dispatch-modal-body').innerHTML = `
    <div class="dispatch-loading">
      <div class="spinner"></div>
      Calculando ruta óptima...
    </div>`;
  document.getElementById('dispatch-confirm-btn').style.display = 'none';
  openModal('dispatch-modal');

  try {
    await loadGoogleMaps();
  } catch(e) {
    document.getElementById('dispatch-modal-body').innerHTML = `
      <div class="empty-state">Google Maps no está disponible. Verificá la clave de API.</div>`;
    return;
  }

  if (!googleMapsReady) {
    document.getElementById('dispatch-modal-body').innerHTML = `
      <div class="empty-state">Google Maps no está disponible. Verificá la clave de API.</div>`;
    return;
  }

  // Fetch listo orders with domicilio
  const { data: orders, error } = await sb
    .from('orders')
    .select('id,order_number,nombre,apellido,telefono,domicilio,total,status')
    .eq('status', 'listo')
    .not('domicilio', 'is', null)
    .neq('domicilio', '');

  if (error || !orders || orders.length === 0) {
    document.getElementById('dispatch-modal-body').innerHTML =
      `<div class="empty-state">No hay pedidos listos con domicilio.</div>`;
    return;
  }

  // Build waypoints
  const waypoints = orders.map(o => ({
    location: o.domicilio.trim() + ', Funes, Santa Fe, Argentina',
    stopover: true
  }));

  const directionsService = new google.maps.DirectionsService();

  directionsService.route({
    origin: STORE_ADDRESS,
    destination: STORE_ADDRESS,
    waypoints: waypoints,
    optimizeWaypoints: true,
    travelMode: google.maps.TravelMode.DRIVING
  }, (result, status) => {
    if (status !== 'OK') {
      document.getElementById('dispatch-modal-body').innerHTML =
        `<div class="empty-state">Error calculando ruta: ${status}. Verificá las direcciones.</div>`;
      return;
    }

    // waypointOrder is the optimized order of original indices
    const waypointOrder = result.routes[0].waypoint_order;
    const legs = result.routes[0].legs;

    // Reorder orders according to optimized route
    const orderedOrders = waypointOrder.map(i => orders[i]);

    // Render departure time picker and stops
    const now = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    // Calculate total duration
    let totalSeconds = 0;
    for (let i = 0; i < legs.length - 1; i++) {
      totalSeconds += legs[i].duration.value;
    }
    const totalMin = Math.round(totalSeconds / 60);

    // Store route data globally for confirm
    dispatchRouteData = { orderedOrders, legs, totalMin };

    renderDispatchStops(hhmm);

    document.getElementById('dispatch-confirm-btn').style.display = 'inline-flex';
  });
}

  const etas = [];

    elapsed += legs[i].duration.value; // seconds
    const etaDate = new Date(base.getTime() + elapsed * 1000);
    etas.push(`${String(etaDate.getHours()).padStart(2,'0')}:${String(etaDate.getMinutes()).padStart(2,'0')}`);

        ${o.telefono ? `<button onclick="abrirWhatsAppEtaDirecta('${esc(o.telefono)}','${esc(o.nombre||'')}','${esc(o.order_number||o.id.slice(0,6))}','${etas[i]}')"
          style="background:#25D366;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.855L0 24l6.335-1.505A11.942 11.942 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.374l-.36-.213-3.728.886.924-3.638-.234-.374A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182c5.42 0 9.818 4.398 9.818 9.818 0 5.42-4.398 9.818-9.818 9.818z"/></svg>

      <input type="time" value="${departureHHMM}" id="dispatch-departure"
        style="padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px"
        onchange="renderDispatchStops(this.value)">

      🛵 ${orderedOrders.length} parada${orderedOrders.length!==1?'s':''} — Duración estimada: ${totalMin} min

async function confirmDispatch() {
  if (!dispatchRouteData) return;
  const { orderedOrders, etas } = dispatchRouteData;

  const btn = document.getElementById('dispatch-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> Despachando...';

  let count = 0;
  for (let i = 0; i < orderedOrders.length; i++) {
    const order = orderedOrders[i];
    const eta = etas[i];

    const { data: updated, error } = await sb
      .from('orders')
      .update({ status: 'en camino' })
      .eq('id', order.id)
      .select()
      .single();

    if (error) {
      console.warn('Error updating order', order.id, error);
      continue;
    }

    count++;

    // Notify edge function with ETA
    try {
      await fetch(NOTIFY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          record: { ...updated, status: 'en camino' },
          old_record: { status: 'listo' },
          eta_texto: eta
        })
      });
    } catch(e) {
      console.warn('notify error:', e);
    }
  }

  btn.disabled = false;
  btn.innerHTML = '✅ Confirmar y despachar';

  closeModal('dispatch-modal');
  toast(`${count} pedido${count!==1?'s':''} despachado${count!==1?'s':''} 🛵`);
  renderPedidos();

  // ── Abrir Google Maps con la ruta completa ──────────────
  if (orderedOrders.length > 0) {
    const stops = orderedOrders.map(o => encodeURIComponent(o.domicilio));
    let mapsUrl;
    if (stops.length === 1) {
      // Un solo destino
      mapsUrl = `https://www.google.com/maps/dir/?api=1` +
        `&origin=${encodeURIComponent(STORE_ADDRESS)}` +
        `&destination=${stops[0]}` +
        `&travelmode=driving`;
    } else {
      // Múltiples paradas: último es destino, intermedios son waypoints
      const destination = stops[stops.length - 1];
      const waypoints = stops.slice(0, -1).join('|');
      mapsUrl = `https://www.google.com/maps/dir/?api=1` +
        `&origin=${encodeURIComponent(STORE_ADDRESS)}` +
        `&destination=${destination}` +
        `&waypoints=${waypoints}` +
        `&travelmode=driving`;
    }
    window.open(mapsUrl, '_blank');
  }
}

// ═══════════════════════════════════════════════════════
//  ── TAB 2: PRODUCTOS ────────────────────────────────
// ═══════════════════════════════════════════════════════
let allProducts = [];
let productSearch = '';

async function renderProductos() {
  const container = document.getElementById('tab-productos');
  container.innerHTML = '<div class="loading-text">Cargando productos...</div>';

  // Load categories
  const { data: cats } = await sb.from('categories').select('id,name').order('name');
  categories = cats || [];

  const { data: prods, error } = await sb
    .from('products')
    .select('id,name,description,price,cost_price,stock,available,category_id')
    .order('name');

  if (error) {
    container.innerHTML = `<div class="card"><div class="empty-state">Error: ${error.message}</div></div>`;
    return;
  }

  allProducts = prods || [];
  renderProductsTable(container);
}

function renderProductsTable(container) {
  const q = productSearch.toLowerCase();
  const filtered = allProducts.filter(p =>
    !q || p.name.toLowerCase().includes(q)
  );

  container.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>🛍️ Productos</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="search-input" placeholder="Buscar producto..." value="${esc(productSearch)}"
            oninput="productSearch=this.value;renderProductsTable(document.getElementById('tab-productos'))">
          <button class="btn btn-primary" onclick="openProductModal(null)">＋ Nuevo producto</button>
        </div>
      </div>
      <div class="table-wrap">
        ${filtered.length === 0
          ? `<div class="empty-state">No se encontraron productos.</div>`
          : `<table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Precio</th>
                  <th>Stock</th>
                  <th>Disponible</th>
                  <th>Categoría</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map(p => productRow(p)).join('')}
              </tbody>
            </table>`
        }
      </div>
    </div>
  `;
}

function productRow(p) {
  const catName = (categories.find(c => c.id === p.category_id) || {}).name || '—';
  return `
    <tr>
      <td>
        <div style="font-weight:600">${esc(p.name)}</div>
        ${p.description ? `<div style="font-size:11px;color:#6b7280">${esc(p.description)}</div>` : ''}
      </td>
      <td style="font-weight:600">$${fmtNum(p.price)}</td>
      <td>
        <div class="stock-display">
          <span id="stock-val-${p.id}" style="cursor:pointer;text-decoration:underline dotted #9ca3af"
            onclick="inlineEditStock('${p.id}', ${p.stock||0})">${p.stock||0}</span>
        </div>
      </td>
      <td>
        <label class="toggle" title="${p.available?'Disponible':'No disponible'}">
          <input type="checkbox" ${p.available?'checked':''} onchange="toggleAvailable('${p.id}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td><span class="badge badge-gray">${esc(catName)}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="openProductModal('${p.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}','${esc(p.name)}')">🗑️</button>
        </div>
      </td>
    </tr>
  `;
}

function inlineEditStock(productId, currentStock) {
  const el = document.getElementById('stock-val-' + productId);
  if (!el) return;

  const input = document.createElement('input');
  input.type = 'number';
  input.min = '0';
  input.step = '1';
  input.value = currentStock;
  input.className = 'stock-input';

  el.replaceWith(input);
  input.focus();
  input.select();

  const save = async () => {
    const newVal = parseInt(input.value) || 0;
    const { error } = await sb.from('products').update({ stock: newVal }).eq('id', productId);
    if (!error) {
      const prod = allProducts.find(p => p.id === productId);
      if (prod) prod.stock = newVal;
      toast('Stock actualizado');
    } else {
      toast('Error al actualizar stock', 'error');
    }
    renderProductsTable(document.getElementById('tab-productos'));
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderProductsTable(document.getElementById('tab-productos')); });
  input.addEventListener('blur', save);
}

async function toggleAvailable(productId, available) {
  const { error } = await sb.from('products').update({ available }).eq('id', productId);
  if (error) {
    toast('Error al actualizar disponibilidad', 'error');
    return;
  }
  const prod = allProducts.find(p => p.id === productId);
  if (prod) prod.available = available;
  toast(available ? 'Producto disponible' : 'Producto no disponible');
}

async function deleteProduct(id, name) {
  if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('products').delete().eq('id', id);
  if (error) {
    toast('Error al eliminar: ' + error.message, 'error');
    return;
  }
  allProducts = allProducts.filter(p => p.id !== id);
  toast('Producto eliminado');
  renderProductsTable(document.getElementById('tab-productos'));
}

// ── Product Modal ────────────────────────────────────────
function openProductModal(productId) {
  const prod = productId ? allProducts.find(p => p.id === productId) : null;

  document.getElementById('product-modal-title').textContent = prod ? 'Editar producto' : 'Nuevo producto';
  document.getElementById('pm-id').value        = prod ? prod.id : '';
  document.getElementById('pm-name').value      = prod ? prod.name : '';
  document.getElementById('pm-desc').value      = prod ? (prod.description||'') : '';
  document.getElementById('pm-price').value     = prod ? prod.price : '';
  document.getElementById('pm-cost').value      = prod ? (prod.cost_price||'') : '';
  document.getElementById('pm-stock').value     = prod ? (prod.stock||0) : 0;
  document.getElementById('pm-available').checked = prod ? !!prod.available : true;
  document.getElementById('pm-margin').innerHTML = '';

  // Populate categories
  const catSel = document.getElementById('pm-category');
  catSel.innerHTML = '<option value="">Sin categoría</option>' +
    categories.map(c => `<option value="${c.id}" ${prod && prod.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('');

  // Margin calc on change
  const updateMargin = () => {
    const price = parseFloat(document.getElementById('pm-price').value) || 0;
    const cost  = parseFloat(document.getElementById('pm-cost').value) || 0;
    const el    = document.getElementById('pm-margin');
    if (price > 0 && cost > 0) {
      const pct = ((price - cost) / cost * 100).toFixed(1);
      const gain = (price - cost).toFixed(2);
      const cls = pct >= 40 ? 'margin-good' : pct >= 20 ? 'margin-ok' : 'margin-bad';
      el.innerHTML = `<span class="margin-display ${cls}">Margen: ${pct}% (ganancia $${gain})</span>`;
    } else {
      el.innerHTML = '';
    }
  };
  document.getElementById('pm-price').oninput = updateMargin;
  document.getElementById('pm-cost').oninput  = updateMargin;
  if (prod && prod.cost_price) updateMargin();

  openModal('product-modal');
}

async function saveProduct() {
  const id    = document.getElementById('pm-id').value;
  const name  = document.getElementById('pm-name').value.trim();
  const price = parseFloat(document.getElementById('pm-price').value);

  if (!name) { toast('El nombre es requerido', 'error'); return; }
  if (!price || isNaN(price)) { toast('El precio es requerido', 'error'); return; }

  const cost = parseFloat(document.getElementById('pm-cost').value) || null;

  const payload = {
    name,
    description: document.getElementById('pm-desc').value.trim() || null,
    price,
    stock: parseInt(document.getElementById('pm-stock').value) || 0,
    available: document.getElementById('pm-available').checked,
    category_id: document.getElementById('pm-category').value || null,
  };

  // Try to include cost_price — handle gracefully if column missing
  if (cost !== null) payload.cost_price = cost;

  const btn = document.getElementById('pm-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> Guardando...';

  let error;
  if (id) {
    const res = await sb.from('products').update(payload).eq('id', id);
    error = res.error;
    if (!error) {
      const idx = allProducts.findIndex(p => p.id === id);
      if (idx >= 0) allProducts[idx] = { ...allProducts[idx], ...payload, id };
    }
  } else {
    const res = await sb.from('products').insert(payload).select().single();
    error = res.error;
    if (!error && res.data) allProducts.unshift(res.data);
  }

  btn.disabled = false;
  btn.innerHTML = 'Guardar producto';

  if (error) {
    // If cost_price column doesn't exist, retry without it
    if (error.message && error.message.includes('cost_price')) {
      delete payload.cost_price;
      const res2 = id
        ? await sb.from('products').update(payload).eq('id', id)
        : await sb.from('products').insert(payload).select().single();
      if (res2.error) {
        toast('Error al guardar: ' + res2.error.message, 'error');
        return;
      }
    } else {
      toast('Error al guardar: ' + error.message, 'error');
      return;
    }
  }

  toast(id ? 'Producto actualizado ✅' : 'Producto creado ✅');
  closeModal('product-modal');
  renderProductsTable(document.getElementById('tab-productos'));
}

async function renderWhatsapp() {
  const container = document.getElementById('tab-whatsapp');
  container.innerHTML = '<div class="loading-text">Cargando mensajes...</div>';

  const { data: msgs, error } = await sb
    .from('whatsapp_messages')
    .select('id,from_number,from_name,body,message_type,intent,created_at')
    .order('created_at', { ascending: false })
    .limit(100);

  if (error) {
    container.innerHTML = `<div class="card"><div class="empty-state">Error: ${error.message}</div></div>`;
    return;
  }

  const messages = msgs || [];

  const intentBadge = {
    pedido:             'badge-blue',
    consulta:           'badge-gray',
    compra_proveedor:   'badge-orange',
    reporte:            'badge-purple',
    saludo:             'badge-green',
    cancelacion:        'badge-red',
  };

  container.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>💬 Mensajes de WhatsApp</h2>
        <span style="font-size:12px;color:#6b7280">Últimos 100 mensajes</span>
      </div>
      ${messages.length === 0
        ? '<div class="empty-state">No hay mensajes registrados.</div>'
        : messages.map(m => {
          const isOutbound = m.message_type === 'outbound' || m.message_type === 'sent';
          const arrow  = isOutbound ? '→' : '←';
          const badge  = m.intent ? intentBadge[m.intent] || 'badge-gray' : '';
          const trunc  = (m.body||'').length > 80 ? m.body.slice(0,80) + '…' : m.body||'';
          const ts     = m.created_at ? new Date(m.created_at).toLocaleString('es-AR',{
            day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'
          }) : '';
          return `
            <div class="wa-msg">
              <div class="wa-arrow" title="${isOutbound?'Enviado':'Recibido'}">${arrow}</div>
              <div class="wa-info">
                <div class="wa-top">
                  <span class="wa-number">${esc(m.from_number||'')}</span>
                  ${m.from_name ? `<span class="wa-name">${esc(m.from_name)}</span>` : ''}
                  ${badge ? `<span class="badge ${badge}">${esc(m.intent)}</span>` : ''}
                  <span class="wa-time">${ts}</span>
                </div>
                <div class="wa-body">${esc(trunc)}</div>
              </div>
            </div>`;
        }).join('')
      }
    </div>
  `;
}

// Modal "En camino": links para cadete y cliente
function abrirModalEnCamino(data, orderNum, riderLink, trackingLink) {
  // Crear modal si no existe
  let modal = document.getElementById('encamino-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'encamino-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
    document.body.appendChild(modal);
  }

  const nombre = data.nombre || 'cliente';
  const telefono = data.telefono || '';
  const phone = telefono.replace(/\D/g,'');
  const waPhone = phone.startsWith('54') ? phone : '54' + phone;

  // Mensaje WhatsApp para el cliente con link de tracking
  const msgCliente = `Hola ${nombre}! Tu pedido #${orderNum} de Natural Funes ya está en camino 🛵\nPodés ver dónde está tu cadete en tiempo real acá: ${trackingLink}\nGracias por tu compra! 🌿`;
  const waClienteUrl = `https://wa.me/${waPhone}?text=${encodeURIComponent(msgCliente)}`;

  modal.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15)">
      <h2 style="font-size:18px;color:#15803d;margin-bottom:4px">Pedido #${orderNum} en camino</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:20px">Compartí estos links para activar el seguimiento</p>

      <div style="background:#f0fdf4;border-radius:12px;padding:14px;margin-bottom:12px">
        <p style="font-size:12px;color:#15803d;font-weight:700;margin-bottom:6px">LINK DEL CADETE</p>
        <p style="font-size:11px;color:#374151;margin-bottom:10px">El cadete abre esto en su celular y comparte el GPS</p>
        <div style="display:flex;gap:8px">
          <input readonly value="${riderLink}" style="flex:1;font-size:11px;padding:8px;border:1px solid #d1fae5;border-radius:8px;background:#fff;min-width:0" onclick="this.select()">
          <button onclick="navigator.clipboard.writeText('${riderLink}');this.textContent='Copiado!';setTimeout(()=>this.textContent='Copiar',1500)" style="background:#15803d;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap">Copiar</button>
        </div>
        <button onclick="enviarWaRider('${esc(data.telefono||'')}','${esc(nombre)}','${orderNum}','${riderLink}')" style="margin-top:8px;width:100%;background:#25D366;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">
          Enviar por WhatsApp al cadete
        </button>
      </div>

      <div style="background:#eff6ff;border-radius:12px;padding:14px;margin-bottom:20px">
        <p style="font-size:12px;color:#1d4ed8;font-weight:700;margin-bottom:6px">LINK DEL CLIENTE</p>
        <p style="font-size:11px;color:#374151;margin-bottom:10px">El cliente ve el mapa en vivo desde su celular</p>
        <div style="display:flex;gap:8px">
          <input readonly value="${trackingLink}" style="flex:1;font-size:11px;padding:8px;border:1px solid #bfdbfe;border-radius:8px;background:#fff;min-width:0" onclick="this.select()">
          <button onclick="navigator.clipboard.writeText('${trackingLink}');this.textContent='Copiado!';setTimeout(()=>this.textContent='Copiar',1500)" style="background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap">Copiar</button>
        </div>
        ${telefono ? `<a href="${waClienteUrl}" target="_blank" style="display:block;margin-top:8px;width:100%;background:#25D366;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none">
          Enviar por WhatsApp al cliente
        </a>` : '<p style="font-size:11px;color:#9ca3af;margin-top:6px">Sin teléfono registrado — copiá el link y envialo manualmente</p>'}
      </div>

      <button onclick="document.getElementById('encamino-modal').style.display='none'" style="width:100%;background:#f3f4f6;color:#374151;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer">
        Cerrar
      </button>
    </div>
  `;
  modal.style.display = 'flex';
  modal.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };
}

function enviarWaRider(telefono, nombre, orderNum, riderLink) {
  const phone = telefono.replace(/\D/g,'');
  const waPhone = phone.startsWith('54') ? phone : '54' + phone;
  const msg = `Hola ${nombre}! Pedido #${orderNum} asignado. Abrí este link en tu celular para activar el GPS de seguimiento: ${riderLink}`;
  window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// Calcula ETA con Google Maps Directions y abre WhatsApp
async function abrirWhatsAppConETA(telefono, nombre, orderNum, domicilio) {
  let etaTexto = null;

  if (domicilio && domicilio.trim()) {
    try {
      await loadGoogleMaps();

      // Si la dirección ya incluye ciudad, no agregar Funes; sino agregar Santa Fe, Argentina
      const yaIncluyCiudad = /rosario|funes|roldan|pueblo esther/i.test(domicilio);
      const destino = domicilio.trim() + (yaIncluyCiudad ? ', Argentina' : ', Funes, Santa Fe, Argentina');

      const directionsService = new google.maps.DirectionsService();

      const result = await new Promise((resolve, reject) => {
        directionsService.route({
          origin: STORE_ADDRESS,
          destination: destino,
          travelMode: google.maps.TravelMode.DRIVING,
        }, (res, status) => {
          if (status === 'OK') resolve(res);
          else reject(new Error(`Google Maps: ${status} — destino: ${destino}`));
        });
      });

      const segundos = result.routes[0].legs[0].duration.value;
      const minutos  = Math.round(segundos / 60);
      const eta      = new Date(Date.now() + segundos * 1000);
      const hhmm     = `${String(eta.getHours()).padStart(2,'0')}:${String(eta.getMinutes()).padStart(2,'0')}`;
      etaTexto = `a las ${hhmm} (${minutos} min)`;
    } catch(e) {
      console.warn('ETA calc error:', e);
      toast(`⚠️ No se pudo calcular ETA: ${e.message}`, 'error');
    }
  }

  const tiempoMsj = etaTexto
    ? `Llega aproximadamente ${etaTexto}.`
    : 'Ya está en camino 🛵';

  const msg = `Hola ${nombre || 'cliente'} 👋! Tu pedido #${orderNum} de Natural Funes está en camino. ${tiempoMsj} ¡Muchas gracias por tu compra! 🌿`;

  const phone = telefono.replace(/\D/g, '');
  const waPhone = phone.startsWith('54') ? phone : '54' + phone;
  window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// Abre WhatsApp con ETA ya calculada (desde modal de despacho)
function abrirWhatsAppEtaDirecta(telefono, nombre, orderNum, eta) {
  const msg = `Hola ${nombre || 'cliente'} 👋! Tu pedido #${orderNum} de Natural Funes está en camino y llega aproximadamente a las ${eta}. ¡Muchas gracias por tu compra! 🌿`;
  const phone = telefono.replace(/\D/g, '');
  const waPhone = phone.startsWith('54') ? phone : '54' + phone;
  window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtNum(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
